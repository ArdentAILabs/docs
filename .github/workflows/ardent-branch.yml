name: Test with Ardent branch

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      ARDENT_BRANCH: pr-${{ github.event.pull_request.number }}-${{ github.run_id }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Install Ardent CLI
        run: npm install -g ardent-cli

      - name: Log in to Ardent
        env:
          ARDENT_TOKEN: ${{ secrets.ARDENT_TOKEN }}
        run: ardent login --token "$ARDENT_TOKEN"

      - name: Select project and connector
        env:
          ARDENT_TOKEN: ${{ secrets.ARDENT_TOKEN }}
        run: |
          # Internal docs validation fixture; see workflows/ci-cd.mdx for the generic workflow.
          ardent project switch newer-testing
          ardent connector switch new-connector

      - name: Create database branch
        env:
          ARDENT_TOKEN: ${{ secrets.ARDENT_TOKEN }}
        run: |
          DATABASE_URL="$(ardent branch create "$ARDENT_BRANCH" --print-url)"
          echo "ARDENT_BRANCH_CREATED=true" >> "$GITHUB_ENV"
          case "$DATABASE_URL" in
            postgres://*|postgresql://*) ;;
            *) echo "Ardent did not return a Postgres database URL" >&2; exit 1 ;;
          esac
          echo "::add-mask::$DATABASE_URL"
          echo "DATABASE_URL=$DATABASE_URL" >> "$GITHUB_ENV"

      - name: Run migration tests
        run: npm test

      - name: Delete database branch
        if: always() && env.ARDENT_BRANCH_CREATED == 'true'
        env:
          ARDENT_TOKEN: ${{ secrets.ARDENT_TOKEN }}
        run: ardent branch delete "$ARDENT_BRANCH"
